# Local OpenTelemetry Collector config for development.
# In ECS, the ADOT sidecar uses an equivalent config that exports to CloudWatch X-Ray.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024

exporters:
  # Print traces to stdout — useful for local development
  debug:
    verbosity: detailed

  # Uncomment to export to Jaeger for UI-based trace exploration:
  # otlp/jaeger:
  #   endpoint: jaeger:4317
  #   tls:
  #     insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
